<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>【公式】特典受領センター</title>
  <meta name="robots" content="noindex,nofollow" />

  <style>
    :root {
      --primary-dark: #0a1128;
      --accent-gold: #d4af37;
      --gold-gradient: linear-gradient(135deg, #f9d976 0%, #d4af37 100%);
      --line-green: #06c755;
      --text-white: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.7);
      --glass: rgba(255, 255, 255, 0.05);
      --stroke: rgba(255, 255, 255, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--primary-dark);
      background-image: 
        radial-gradient(circle at 50% -20%, #1a2a44 0%, transparent 70%),
        radial-gradient(circle at 0% 100%, #0d1b2a 0%, transparent 50%);
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      color: var(--text-white);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .container {
      position: relative;
      z-index: 10;
      width: min(480px, 92vw);
      padding: 40px 24px;
      background: rgba(16, 24, 48, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--stroke);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .official-badge {
      display: inline-block;
      padding: 4px 12px;
      background: var(--gold-gradient);
      color: #333;
      font-size: 11px;
      font-weight: 900;
      border-radius: 4px;
      margin-bottom: 16px;
      letter-spacing: 0.1em;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 24px;
      letter-spacing: 0.05em;
    }

    #countdown-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .count-number {
      font-size: 100px;
      font-weight: 900;
      color: var(--accent-gold);
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      margin: 20px 0;
      animation: countInput 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .count-text {
      font-size: 80px;
    }

    @keyframes countInput {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    #result-screen {
      display: none;
      animation: fadeIn 0.8s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .win-announce {
      color: var(--accent-gold);
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .pill {
      background: var(--glass);
      border: 1px solid var(--stroke);
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 14px;
      display: inline-block;
      margin-bottom: 15px;
    }

    .money-amount {
      font-size: 56px;
      font-weight: 900;
      background: linear-gradient(to bottom, #fff, #bbb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 10px 0 25px;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
    }

    .instruction {
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .line-button {
      position: relative;
      display: block;
      width: 100%;
      background: var(--line-green);
      color: white;
      text-decoration: none;
      padding: 20px;
      border-radius: 16px;
      font-size: 19px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(6, 199, 85, 0.3);
      transition: all 0.2s;
      overflow: hidden;
      animation: pulse-green 2s infinite;
    }

    .line-button::before {
      content: "";
      position: absolute;
      top: -100%;
      left: -100%;
      width: 300%;
      height: 300%;
      background: linear-gradient(
        45deg,
        rgba(255,255,255,0) 45%,
        rgba(255,255,255,0.6) 50%,
        rgba(255,255,255,0) 55%
      );
      animation: shimmer 2.5s infinite;
    }

    .sub-text {
      display: block;
      font-size: 12px;
      margin-top: 4px;
      opacity: 0.9;
      font-weight: 400;
    }

    @keyframes shimmer {
      0% { transform: translate(-30%, -30%); }
      100% { transform: translate(30%, 30%); }
    }

    @keyframes pulse-green {
      0% { transform: scale(1); box-shadow: 0 10px 20px rgba(6, 199, 85, 0.3); }
      50% { transform: scale(1.03); box-shadow: 0 15px 30px rgba(6, 199, 85, 0.5); }
      100% { transform: scale(1); box-shadow: 0 10px 20px rgba(6, 199, 85, 0.3); }
    }

    .footer-note {
      margin-top: 25px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <main class="container">
    <div class="official-badge">OFFICIAL NOTICE</div>
    
    <div id="countdown-screen">
      <h1 class="title">エントリー情報を照合中...</h1>
      <div class="count-number" id="digital-count">3</div>
    </div>

    <div id="result-screen">
      <p class="win-announce">🎉 当選おめでとうございます</p>
      <div class="pill">20歳以上限定特典</div>
      <div class="money-amount" id="prize-amount">350,000円</div>
      <p class="instruction">
        ご当選おめでとうございます。<br>
        本日の特典受け取り期限が迫っています。<br>
        下記より公式LINEを追加して申請してください。
      </p>

      <a href="https://lin.ee/oUd3fh1" class="line-button">
        今すぐ特典を受け取る
        <span class="sub-text">（公式LINE追加画面が開きます）</span>
      </a>

      <div class="footer-note">
        ※本通知はシステムの厳正な抽選により配信されています。<br>
        一定時間を過ぎますと権利が失効する場合がございます。
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const countEl = document.getElementById('digital-count');
      const countdownScreen = document.getElementById('countdown-screen');
      const resultScreen = document.getElementById('result-screen');
      
      const sequence = ["3", "2", "1", "当選"];
      let index = 0;

      // 間隔を0.4秒から0.8秒（800ms）に変更しました
      const timer = setInterval(() => {
        index++;
        if (index < sequence.length) {
          countEl.style.animation = 'none';
          countEl.offsetHeight; 

          if (sequence[index] === "当選") {
            countEl.classList.add('count-text');
          }

          countEl.textContent = sequence[index];
          // アニメーション時間も少しだけ伸ばして、ゆったり感を出しています
          countEl.style.animation = 'countInput 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
        } else {
          clearInterval(timer);
          // 最後の「当選」表示後に一呼吸置く
          setTimeout(() => {
            countdownScreen.style.display = 'none';
            resultScreen.style.display = 'block';
          }, 600);
        }
      }, 800); 
    });
  </script>
</body>
</html>
